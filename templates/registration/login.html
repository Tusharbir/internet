{% extends 'base.html' %}

{% block title %}Login | UniTrade{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h3 class="card-title mb-3">Welcome back</h3>
          <form method="post" class="vstack gap-3" autocomplete="off">
            {% csrf_token %}
            {% if form.non_field_errors %}
              <div class="alert alert-danger">
                {% for error in form.non_field_errors %}
                  <p class="mb-0">{{ error }}</p>
                {% endfor %}
              </div>
            {% endif %}
            <div>
              <label for="id_username" class="form-label">Username</label>
              <input type="text" name="username" id="id_username" class="form-control" autocomplete="username" autofocus required
                     {% if form.username.value %}value="{{ form.username.value }}"{% endif %}>
            </div>
            <div>
              <label for="id_password" class="form-label">Password</label>
              <input type="password" name="password" id="id_password" class="form-control" autocomplete="current-password" required>
            </div>
            <button class="btn btn-primary" type="submit">Login</button>
          </form>
          <div class="mt-3 d-flex justify-content-between">
            <a href="{% url 'password_reset' %}">Forgot your password?</a>
            <a href="{% url 'marketplace:register' %}">Create account</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
