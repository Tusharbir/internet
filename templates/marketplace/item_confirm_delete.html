{% extends 'base.html' %}

{% block title %}Delete Item | UniTrade{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-sm border-danger-subtle">
        <div class="card-body">
          <h3>Delete listing</h3>
          <p class="mb-2">You are about to permanently remove <strong>{{ object.title }}</strong>.</p>
          <p class="text-muted">This action cannot be undone, and buyers will no longer be able to view the listing.</p>
          <form method="post" class="d-flex flex-wrap gap-2">
            {% csrf_token %}
            <button class="btn btn-danger" type="submit">Yes, delete</button>
            <a href="{% url 'marketplace:item_detail' object.pk %}" class="btn btn-outline-secondary">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
